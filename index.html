<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>M.K Free AI Video Summarizer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #e3ecff, #f5f7ff);
            text-align: center;
        }

        .container {
            padding: 60px 20px;
        }

        h1 {
            font-size: 48px;
            margin-bottom: 10px;
        }

        h2 {
            font-weight: 300;
            color: #555;
            margin-bottom: 30px;
        }

        .highlight {
            background: #ff4fd8;
            color: white;
            padding: 5px 10px;
            border-radius: 6px;
        }

        .upload-box {
            background: white;
            padding: 30px;
            border-radius: 20px;
            max-width: 500px;
            margin: auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        input[type="file"] {
            margin: 15px 0;
        }

        button {
            background: #4a7cff;
            color: white;
            border: none;
            padding: 15px 25px;
            border-radius: 30px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #2f5ee5;
        }

        .result {
            margin-top: 40px;
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
        }

        .box {
            width: 45%;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            margin-top: 20px;
        }

        @media(max-width: 768px) {
            .box {
                width: 90%;
            }
        }
    </style>
</head>
<body>

<div class="container">

    <h1>M.K Free AI Video <span class="highlight">Summarizer</span></h1>
    <h2>Convert any video into smart summary using AI – 100% Free</h2>

    <div class="upload-box">
        <form method="POST" enctype="multipart/form-data">
            <input type="file" name="video" required>
            <br>
            <button type="submit">Upload & Get FREE Summary</button>
        </form>
    </div>

    {% if full_text %}
    <div class="result">

        <div class="box">
            <h3>📄 Full Transcript</h3>
            <p>{{ full_text }}</p>
        </div>

        <div class="box">
            <h3>⚡ AI Summary</h3>
            <p>{{ summary_text }}</p>
        </div>

    </div>
    {% endif %}

</div>

</body>
</html>
